services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: srg
      POSTGRES_PASSWORD: srg_secret
      POSTGRES_DB: srg_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir", "/data"]
    ports:
      - "4223:4222"
      - "8223:8222"
    volumes:
      - natsdata:/data

volumes:
  pgdata:
  natsdata:
